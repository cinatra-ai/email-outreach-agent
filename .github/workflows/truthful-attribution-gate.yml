name: truthful-attribution-gate
# Thin caller for the org-reusable truthful-attribution-gate (cinatra-ai/ci),
# per ratified spec cinatra-engineering#119 (re-scopes/supersedes #116). WARN mode
# (eng#119 rollout): findings are annotated but do not fail the check once the
# reusable workflow starts — it stays advisory and never blocks a PR on a finding.
# No .github/gate-suite.json committed (WARN scope exercises presence + the human
# arm; the gate-suite arm is not exercised without a suite).
# Pinned to the immutable engine SHA (8eede102), selected from ci main at adoption
# time — one commit ahead of the then-current release tag. The trailing version
# comment on the `uses:` line uses semver build-metadata (`+8eede102`) rather than a
# bare tag, so the actions-pinned-gate's version-comment format is satisfied without
# claiming the pin IS the tag (truthful metadata).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read
  # actions:read is MANDATORY: the engine at 8eede102 resolves a reusable-workflow
  # check-run to its Actions run (GET /actions/runs/{id}) to verify referenced_workflows[]
  # at the pinned SHA. With an explicit permissions block, any omitted scope defaults
  # to `none`, and a called reusable workflow cannot exceed the caller's grant — so
  # omitting this causes startup_failure (red/missing check), which WARN mode CANNOT
  # rescue (it fails before any step runs). Do not drop this line.
  actions: read

jobs:
  truthful-attribution-gate:                 # caller job id MUST stay this exact string
    uses: cinatra-ai/ci/.github/workflows/truthful-attribution-gate.yml@8eede1022e835997d94974e4bd6205daf72131a2 # v0.1.0+8eede102
    with:
      mode: warn
      ref: 8eede1022e835997d94974e4bd6205daf72131a2
